<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aide au choix d'une application utilisant des IA génératives</title>
    <meta name="description" content="Arbre de décision pour choisir un outil d'IA générative adapté à vos besoins et conforme aux normes" />
    <meta name="author" content="uneIAparjour" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      @font-face {
        font-family: 'Marianne';
        src: url('/Marianne-Regular.woff2') format('woff2'),
             url('/Marianne-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Marianne';
        src: url('/Marianne-Medium.woff2') format('woff2'),
             url('/Marianne-Medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Marianne';
        src: url('/Marianne-Bold.woff2') format('woff2'),
             url('/Marianne-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var lastHeight = 0;
        function sendHeight() {
          var root = document.getElementById('root');
          if (!root) return;
          var h = Math.max(root.offsetHeight, root.scrollHeight);
          if (h !== lastHeight && h > 0) {
            lastHeight = h;
            window.parent.postMessage({ type: 'iframeResize', height: h }, '*');
          }
        }
        if (window.ResizeObserver) {
          new ResizeObserver(sendHeight).observe(document.getElementById('root'));
        }
        setInterval(sendHeight, 500);
      })();
    </script>
    <script src="/choix-outil-ia/iframe-resize.js"></script>
  </body>
  </body>
</html>
